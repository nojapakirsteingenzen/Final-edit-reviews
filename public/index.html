<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Newest Reviews</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div id="reviews"></div>

<script>

async function loadReviews(){

  try{

    const res = await fetch("/api/reviews");
    const json = await res.json();

    const container = document.getElementById("reviews");

    /* detect where the array is */

    let reviews = [];

    if(Array.isArray(json)){
      reviews = json;
    }
    else if(Array.isArray(json.reviews)){
      reviews = json.reviews;
    }
    else{
      throw new Error("API did not return reviews array");
    }

    container.innerHTML = "";

    reviews.slice(0,12).forEach(r => {

      const stars =
        "★".repeat(r.rating_overall || 5) +
        "☆".repeat(5 - (r.rating_overall || 5));

      let snippet = r.review_description || "";

      if(snippet.length > 140){
        snippet = snippet.substring(0,137) + "...";
      }

      const card = document.createElement("a");

      card.className = "review-card";
      card.href = r.company_link || "#";
      card.target = "_blank";

      card.innerHTML = `

      <div class="review-header">

        <img class="review-logo"
             src="${r.logo || ''}" />

        <div>
          <div class="review-company">
            ${r.company || "Company"}
          </div>

          <div class="review-stars">
            ${stars}
          </div>
        </div>

      </div>

      <div class="review-title">
        ${r.review_title || ""}
      </div>

      <div class="review-text">
        ${snippet}
      </div>

      <div class="review-footer">
        <span>Verified Review</span>
        <span>Read More →</span>
      </div>

      `;

      container.appendChild(card);

    });

  }

  catch(err){

    document.getElementById("reviews").innerHTML =
      "Unable to load reviews.";

    console.error(err);

  }

}

loadReviews();

</script>


</body>
</html>
