<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Newest Reviews</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- THIS IS REQUIRED -->
<div id="reviews"></div>

<script>

async function loadReviews(){

try{

const res = await fetch("/api/reviews");
const json = await res.json();

const container=document.getElementById("reviews");

/* CHECK MESSAGE INSTEAD OF DATA */

if(!json.message){
container.innerHTML="No reviews available.";
return;
}

/* PARSE HTML */

const parser=new DOMParser();
const doc=parser.parseFromString(json.message,"text/html");

const reviews=doc.querySelectorAll(".module.search_result");

container.innerHTML="";

let cards=[];
let seenCompanies=new Set();

reviews.forEach(r=>{

const company =
r.querySelector(".notranslate")?.innerText ||
r.querySelector("h3")?.innerText ||
"Company";

/* REMOVE DUPLICATES */

if(seenCompanies.has(company)) return;
seenCompanies.add(company);

/* DESCRIPTION */

let description =
r.querySelectorAll("p")[1]?.innerText ||
r.querySelector("p")?.innerText ||
"";

description=description.replace(/<[^>]*>?/gm,'');

if(description.length>140){
description=description.substring(0,137)+"...";
}

/* LINK */

const path=r.querySelector("a")?.getAttribute("href") || "";
const link="https://www.biohackingcompanies.com"+path;

/* LOGO */

const logoPath=r.querySelector("img")?.getAttribute("src") || "";
const logo="https://www.biohackingcompanies.com"+logoPath;

cards.push({
company,
description,
link,
logo
});

});

/* RANDOMIZE */

cards.sort(()=>Math.random()-0.5);

/* LIMIT */

cards=cards.slice(0,12);

/* CREATE CARDS */

cards.forEach(c=>{

const card=document.createElement("a");

card.className="review-card";
card.href=c.link;
card.target="_blank";

card.innerHTML=`

<div class="review-header">

<img class="review-logo" src="${c.logo}" alt="${c.company}">

<div>

<div class="review-company">${c.company}</div>

<div class="review-stars">★★★★★</div>

</div>

</div>

<div class="review-text">${c.description}</div>

<div class="review-footer">

<span>Verified Review</span>

<span>Read More →</span>

</div>

`;

container.appendChild(card);

});

}

catch(err){

document.getElementById("reviews").innerHTML="Unable to load reviews.";

console.error(err);

}

}

loadReviews();

/* REFRESH EVERY 30s */

setInterval(loadReviews,30000);

</script>

</body>
</html>
