<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Newest Reviews</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>

.review-header{
display:flex;
align-items:center;
gap:10px;
}

.review-logo{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
}

</style>

</head>

<body>

<div id="reviews"></div>

<script>

async function loadReviews(){

try{

const res = await fetch("/api/reviews");

const json = await res.json();

const container=document.getElementById("reviews");

if(!json.data){
container.innerHTML="No reviews available.";
return;
}

let reviews=json.data;

/* RANDOMIZE */

reviews.sort(()=>Math.random()-0.5);

/* LIMIT */

reviews=reviews.slice(0,12);

container.innerHTML="";

reviews.forEach(r=>{

const company=r.company_name || r.review_name || "Company";

let description=r.review_description || "";

description=description.replace(/<[^>]*>?/gm,'');

if(description.length>140){
description=description.substring(0,137)+"...";
}

const logo=r.company_logo || r.logo || "/favicon.ico";

const link=r.review_link || "#";

const card=document.createElement("a");

card.className="review-card";
card.href=link;
card.target="_blank";

card.innerHTML=`

<div class="review-header">

<img class="review-logo" src="${logo}">

<div>

<div class="review-company">${company}</div>

<div class="review-stars">★★★★★</div>

</div>

</div>

<div class="review-text">${description}</div>

<div class="review-footer">

<span>Verified Review</span>

<span>Read More →</span>

</div>

`;

container.appendChild(card);

});

}

catch(err){

document.getElementById("reviews").innerHTML="Unable to load reviews";

console.error(err);

}

}

loadReviews();

/* refresh every 30 seconds */

setInterval(loadReviews,30000);

</script>

</body>
</html>
