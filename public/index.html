<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Newest Reviews</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div id="reviews"></div>

<script>

async function loadReviews(){

try{

const res = await fetch("/api/reviews");
const json = await res.json();

const container = document.getElementById("reviews");

if(!container){
console.error("Reviews container not found");
return;
}

if(!json.message){
container.innerHTML="No reviews available.";
return;
}

const parser = new DOMParser();
const doc = parser.parseFromString(json.message,"text/html");

const reviews = doc.querySelectorAll(".module.search_result");

container.innerHTML="";

const seen = new Set();
let cards=[];

reviews.forEach(r=>{

const company =
r.querySelector(".notranslate")?.innerText ||
r.querySelector("h3")?.innerText ||
"Company";

if(seen.has(company)) return;
seen.add(company);

let description =
r.querySelector("p")?.innerText || "";

if(description.length>120){
description = description.substring(0,117)+"...";
}

const logo =
r.querySelector("img.review_photo")?.src ||
r.querySelector("img")?.src ||
"";

const path =
r.querySelector("a")?.getAttribute("href") || "";

const link =
"https://www.biohackingcompanies.com"+path;

cards.push({
company,
description,
logo,
link
});

});

/* RANDOM */

cards.sort(()=>Math.random()-0.5);

/* LIMIT */

cards = cards.slice(0,12);

/* BUILD */

cards.forEach(c=>{

const card=document.createElement("div");

card.className="member-review";

card.innerHTML=`

<div class="member-review-image">
<a href="${c.link}">
<img class="img-rounded xs-bmargin review_photo" src="${c.logo}">
</a>
</div>

<div class="member-review-info">

<div class="review-title">
<a href="${c.link}">${c.company}</a>
</div>

<div class="star_rating">
★★★★★
</div>

<p>${c.description}</p>

</div>

`;

container.appendChild(card);

});

}

catch(err){

console.error(err);

}

}

loadReviews();

</script>

</body>
</html>
