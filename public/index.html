<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Newest Reviews</title>

<link rel="icon" href="favicon.ico">

<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Open Sans',sans-serif;
background:#ffffff;
margin:40px;
color:#2a2a3a;
}

/* GRID */

#reviews{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-top:40px;
}

/* CARD */

.review-card{
display:flex;
flex-direction:column;
gap:10px;
padding:18px;
background:#f5f5f7;
border-radius:12px;
border:1px solid rgba(0,0,0,.08);
text-decoration:none;
color:#333;
transition:.25s;
}

.review-card:hover{
transform:translateY(-4px);
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

/* LOGO */

.review-logo{
text-align:center;
margin-bottom:10px;
}

.review-logo img{
max-width:120px;
max-height:60px;
object-fit:contain;
}

/* COMPANY */

.review-company{
font-weight:700;
font-size:13px;
}

/* STARS */

.review-stars{
color:#ff9500;
font-size:13px;
}

/* TEXT */

.review-text{
font-size:12px;
line-height:1.6;
color:#666;
}

/* FOOTER */

.review-footer{
display:flex;
justify-content:space-between;
font-size:10px;
color:#999;
margin-top:auto;
}

/* RESPONSIVE */

@media(max-width:1024px){
#reviews{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:640px){
#reviews{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<div id="reviews"></div>

<script>

async function loadReviews(){

try{

const res = await fetch("/api/reviews");
const json = await res.json();

const container = document.getElementById("reviews");

if(!json.message){
container.innerHTML="No reviews available.";
return;
}

/* PARSE HTML */

const parser = new DOMParser();
const doc = parser.parseFromString(json.message,"text/html");

/* GET REVIEWS */

const reviews = doc.querySelectorAll(".module.search_result");

/* CLEAR GRID */

container.innerHTML="";

/* STORAGE */

let cards=[];
let seenCompanies=new Set();

/* LOOP */

reviews.forEach(r=>{

const company =
r.querySelector(".notranslate")?.innerText ||
r.querySelector("h3")?.innerText ||
"Company";

/* REMOVE DUPLICATES */

if(seenCompanies.has(company)) return;
seenCompanies.add(company);

/* DESCRIPTION */

let description =
r.querySelector("p")?.innerText || "";

description = description.replace(/<[^>]*>?/gm,'');

if(description.length>140){
description=description.substring(0,137)+"...";
}

/* LOGO */

const logoPath =
r.querySelector("img.review_photo")?.getAttribute("src") ||
r.querySelector("img")?.getAttribute("src") ||
"";

const logo =
logoPath.startsWith("http")
? logoPath
: "https://www.biohackingcompanies.com"+logoPath;

/* LINK */

const path =
r.querySelector("a")?.getAttribute("href") || "";

const link =
"https://www.biohackingcompanies.com"+path;

/* STORE */

cards.push({
company,
description,
logo,
link
});

});

/* RANDOMIZE */

cards.sort(()=>Math.random()-0.5);

/* LIMIT */

cards=cards.slice(0,12);

/* RENDER */

cards.forEach(c=>{

const card=document.createElement("a");

card.className="review-card";
card.href=c.link;
card.target="_blank";

card.innerHTML=`

<div class="review-logo">
<img src="${c.logo}" alt="${c.company}">
</div>

<div class="review-company">${c.company}</div>

<div class="review-stars">★★★★★</div>

<div class="review-text">${c.description}</div>

<div class="review-footer">
<span>Verified Review</span>
<span>Read More →</span>
</div>

`;

container.appendChild(card);

});

}

catch(err){

document.getElementById("reviews").innerHTML="Unable to load reviews.";

console.error(err);

}

}

loadReviews();

/* OPTIONAL AUTO REFRESH */

setInterval(loadReviews,30000);

</script>

</body>
</html>
