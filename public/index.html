<!DOCTYPE html>
<html>
<head>

<link rel="icon" href="favicon.ico">

<meta charset="UTF-8">
<title>Newest Reviews</title>

<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Open Sans',sans-serif;
background:#f5f5f5;
margin:0;
padding:40px;
}

/* GRID */

#reviews{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
max-width:1200px;
margin:auto;
}

/* CARD */

.review-card{
background:#fff;
border-radius:12px;
padding:20px;
box-shadow:0 2px 12px rgba(0,0,0,0.08);
text-decoration:none;
color:#333;
transition:0.3s;
display:block;
}

.review-card:hover{
transform:translateY(-4px);
}

/* HEADER */

.review-header{
display:flex;
align-items:center;
gap:12px;
margin-bottom:10px;
}

/* LOGO */

.review-logo{
width:40px;
height:40px;
object-fit:contain;
border-radius:6px;
flex-shrink:0;
}

/* COMPANY */

.review-company{
font-weight:600;
font-size:16px;
}

/* STARS */

.review-stars{
color:#f4a623;
font-size:14px;
margin-top:2px;
}

/* REVIEW TEXT */

.review-text{
font-size:14px;
color:#555;
line-height:1.5;
margin-top:10px;
}

/* FOOTER */

.review-footer{
display:flex;
justify-content:space-between;
margin-top:15px;
font-size:12px;
color:#888;
}

</style>

</head>

<body>

<div id="reviews"></div>

<script>

async function loadReviews(){

try{

const res = await fetch("/api/reviews");
const json = await res.json();

const container = document.getElementById("reviews");

if(!json.message){
container.innerHTML="No reviews available.";
return;
}

/* PARSE HTML RESPONSE */

const parser = new DOMParser();
const doc = parser.parseFromString(json.message,"text/html");

/* GET REVIEW ELEMENTS */

const reviews = doc.querySelectorAll(".module.search_result");

/* CLEAR CONTAINER */

container.innerHTML="";

/* CONVERT TO ARRAY */

let reviewArray = Array.from(reviews);

/* RANDOMIZE */

reviewArray.sort(()=>Math.random()-0.5);

/* TRACK UNIQUE COMPANIES */

const companies = {};

let count = 0;

for(const r of reviewArray){

if(count >= 12) break;

/* COMPANY NAME */

const company =
r.querySelector(".notranslate")?.innerText ||
r.querySelector("h3")?.innerText ||
"Company";

/* PREVENT DUPLICATE COMPANIES */

if(companies[company]) continue;
companies[company] = true;

/* DESCRIPTION */

let description =
r.querySelector("p")?.innerText || "";

description = description.replace(/<[^>]*>?/gm,'');

if(description.length > 140){
description = description.substring(0,137) + "...";
}

/* COMPANY LOGO */

const logoPath =
r.querySelector("img")?.getAttribute("src") || "";

const logo =
logoPath.startsWith("http")
? logoPath
: "https://www.biohackingcompanies.com" + logoPath;

/* REVIEW LINK */

const path =
r.querySelector("a")?.getAttribute("href") || "";

const link =
"https://www.biohackingcompanies.com" + path;

/* CREATE CARD */

const card = document.createElement("a");

card.className="review-card";
card.href=link;
card.target="_blank";

card.innerHTML = `

<div class="review-header">

<img class="review-logo" src="${logo}" alt="${company}">

<div>

<div class="review-company">${company}</div>

<div class="review-stars">★★★★★</div>

</div>

</div>

<div class="review-text">${description}</div>

<div class="review-footer">
<span>Verified Review</span>
<span>Read More →</span>
</div>

`;

container.appendChild(card);

count++;

}

}

catch(err){

document.getElementById("reviews").innerHTML="Unable to load reviews.";
console.error(err);

}

}

/* LOAD */

loadReviews();

/* OPTIONAL AUTO REFRESH */

setInterval(loadReviews,30000);

</script>

</body>
</html>
