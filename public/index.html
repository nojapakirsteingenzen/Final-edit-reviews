<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Newest Reviews</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div id="reviews"></div>

<script>
async function loadReviews(){

  const container = document.getElementById("reviews");

  try{

    const res = await fetch("https://yourdomain.com/api/reviews.php");
    const data = await res.json();

    container.innerHTML = "";

    data.forEach(c=>{

      const stars = "★".repeat(c.rating_overall);

      const link = `https://www.biohackingcompanies.com/reviews/${c.review_id}`;

      const card = document.createElement("a");

      card.className = "review-card";
      card.href = link;
      card.target = "_blank";

      card.innerHTML = `
        <div class="review-company">${c.review_company}</div>
        <div class="review-stars">${stars}</div>
        <div class="review-text">${c.review_description}</div>
        <div class="review-footer">
          <span>By ${c.review_name}</span>
          <span>Read More →</span>
        </div>
      `;

      container.appendChild(card);

    });

  } catch(err){

    container.innerHTML = "Failed to load reviews.";
    console.error(err);

  }

}

loadReviews();
</script>
</body>
</html>
