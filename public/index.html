<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Newest Reviews</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div id="reviews"></div>

<script>

async function loadReviews(){

  try{

    const res = await fetch("/api/reviews");
    const json = await res.json();

    const container = document.getElementById("reviews");

    if(!json.message){
      container.innerHTML="No reviews available.";
      return;
    }

    const parser = new DOMParser();
    const doc = parser.parseFromString(json.message,"text/html");

    const reviews = doc.querySelectorAll(".module.search_result");

    container.innerHTML="";

    const companiesSeen = new Set();   // prevents duplicates
    let cards = [];

reviews.forEach(r=>{

  /* COMPANY NAME */

  const company =
    r.querySelector(".notranslate")?.innerText.trim() ||
    r.querySelector("h3")?.innerText.trim() ||
    "Company";


  /* SKIP DUPLICATE COMPANIES */

  if(companiesSeen.has(company)) return;
  companiesSeen.add(company);


  /* COMPANY LOGO */

  const logoElement = r.querySelector(".member-review-image img");

  let logo =
      logoElement?.getAttribute("src") ||
      logoElement?.getAttribute("data-src") ||
      "";

  /* FIX RELATIVE LOGO URL */

  if(logo && !logo.startsWith("http")){
      logo = "https://www.biohackingcompanies.com" + logo;
  }


  /* DESCRIPTION */

  let description =
    r.querySelectorAll("p")[1]?.innerText ||
    r.querySelector("p")?.innerText ||
    "";

  if(description.length > 140){
    description = description.substring(0,137)+"...";
  }


  /* COMPANY LINK */

  const path =
    r.querySelector("a")?.getAttribute("href") || "";

  const link =
    "https://www.biohackingcompanies.com"+path;


  /* STORE CARD DATA */

  cards.push({
    company,
    description,
    link,
    logo
  });

});


/* RANDOM ORDER */

cards.sort(()=>Math.random()-0.5);


/* LIMIT TO 12 */

cards = cards.slice(0,12);


/* CREATE CARDS */

cards.forEach(c=>{

  const card=document.createElement("a");

  card.className="review-card";
  card.href=c.link;
  card.target="_blank";

  card.innerHTML=`

    ${c.logo ? `
    <div class="review-logo">
      <img src="${c.logo}" alt="${c.company}" onerror="this.style.display='none'">
    </div>
    ` : ``}

    <div class="review-company">${c.company}</div>

    <div class="review-stars">★★★★★</div>

    <div class="review-text">${c.description}</div>

    <div class="review-footer">
      <span>Verified Review</span>
      <span>Read More →</span>
    </div>

  `;

  container.appendChild(card);

});

  }

  catch(err){

    document.getElementById("reviews").innerHTML =
    "Unable to load reviews.";

    console.error(err);

  }

}

loadReviews();

</script>

</body>
</html>
